<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>教学视频</title>
<style>
  * { margin:0; padding:0; }
  body { background:#000; width:100%; height:100vh; overflow:hidden; }
  /* 播放按钮覆盖层 */
  .play-overlay {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    display: flex; justify-content: center; align-items: center;
    z-index: 2;
  }
  .play-btn {
    width: 80px; height: 80px;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polygon points="30,15 80,50 30,85" fill="white" /></svg>') center no-repeat;
    background-size: contain;
    cursor: pointer;
  }
  video { width:100%; height:100%; object-fit:contain; display:block; position:relative; z-index:1; }
</style>
</head>
<body>
  <div class="play-overlay" id="playOverlay">
    <div class="play-btn" onclick="playVideo()"></div>
  </div>
  <video id="videoPlayer" controls playsinline webkit-playsinline x5-video-player-type="h5">
    <!-- 替换下方的视频直链为你的 jsDelivr 视频地址 -->
    <source src="https://github.com/FJJ12138-AFK/my-video/blob/main/%E5%8F%8C%E6%9D%A0%E8%87%82%E5%B1%88%E4%BC%B8.mp4">
  </video>

  <script>
    function playVideo() {
      document.getElementById('playOverlay').style.display = 'none';
      var v = document.getElementById('videoPlayer');
      v.play();
    }
  </script>
</body>
</html>
